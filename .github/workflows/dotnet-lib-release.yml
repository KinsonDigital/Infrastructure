name: ⚙️ Perform DotNet Lib Release
run-name: ⚙️ Perform ${{ inputs.release-type }} Release (${{ inputs.build-config }} Build)


permissions:
  contents: write


defaults:
  run:
    shell: pwsh


on:
  workflow_call:
    inputs:
      project-name:
        required: true
        description: "The name of the C# project to validate."
        type: string
      release-type:
        required: true
        description: The type of release to perform.  Either 'Preview' or 'Production'.
        type: string
      version:
        required: true
        description: "The application/library version."
        type: string
      net-sdk-version:
        required: true
        description: The version of the .NET SDK to use.
        type: string
      release-notes-file-path:
        required: true
        description: The file path to the release notes file to check for existence.
        type: string
      build-config:
        required: true
        description: The build configuration to use. This is either 'Debug' or 'Release'.
        type: string
      telemetry-enabled:
        required: false
        description: If true, enables telemetry for the dotnet library.
        default: false
        type: boolean
      transpile-readme:
        required: false
        description: If true, transpiles the README.md file HTML to markdown.
        default: false
        type: boolean
    secrets:
      cicd-pat:
        required: true
        description: The CICD personal access token.
      nuget-org-api-key:
        required: true
        description: The NuGet.org API key.
      telemetry-key:
        required: false
        description: The telemetry key to use if telemetry is enabled.


jobs:
  perform_release:
    name: Perform ${{ inputs.release-type }} Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2

      - name: Set Up .NET SDK
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 #v5.2.0
        with:
          dotnet-version: "${{ inputs.net-sdk-version }}"

      - name: Set Up NuGet
        uses: NuGet/setup-nuget@fd55a6f3b34392fa83fde1454582407d8c714123 #v4.0.0

      - name: Set Up Deno
        uses: denoland/setup-deno@22d081ff2d3a40755e97629de92e3bcbfa7cf2ed #v2.0.5
        with:
          deno-version: v2.9.x

      - name: Transpile README
        if: inputs.transpile-readme == true
        uses: ./actions/transpile-readme
        with:
          base-dir-path: "${{ github.workspace }}"

      - name: Update Copyright
        uses: ./actions/update-copyright
        with:
          cs-proj-file-name: "${{ inputs.project-name }}.csproj"

      - name: Create NuGet Package
        env:
          PROJECT_NAME: "${{ inputs.project-name }}"
          BUILD_CONFIG: "${{ inputs.build-config }}"
          TELEMETRY_ENABLED: "${{ inputs.telemetry-enabled }}"
          TELEMETRY_KEY: "${{ secrets.telemetry-key }}"
        run: |
          dotnet pack `
            "$env:GITHUB_WORKSPACE/${env:PROJECT_NAME}/${env:PROJECT_NAME}.csproj" `
            -o "$env:GITHUB_WORKSPACE" `
            -c ${env:BUILD_CONFIG} `
            -p:IncludeSymbols=true `
            -p:SymbolPackageFormat=snupkg `
            -p:EnableTelemetry="$env:TELEMETRY_ENABLED" `
            -p:TelemetryKey="$env:TELEMETRY_KEY";

      - name: NuGet login (OIDC → temp API key)
        uses: NuGet/login@8d196754b4036150537f80ac539e15c2f1028841 # v1.2.0
        id: login
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Publish NuGet Package
        env:
          PROJECT_NAME: "${{ inputs.project-name }}"
          ORG_NAME: "${{ vars.ORGANIZATION_NAME }}"
          VERSION: "${{ inputs.version }}"
        run: |
          $version = "$env:VERSION";
          $version = $version.StartsWith("v") ? $version.Substring(1) : $version;

          # Push the nuget package
          dotnet nuget push `
            "$env:GITHUB_WORKSPACE/$env:ORG_NAME.$env:PROJECT_NAME.$version.nupkg" `
            --source https://api.nuget.org/v3/index.json;

      - name: Create GitHub Release
        uses: ncipollo/release-action@339a81892b84b4eeb0f6e744e4574d79d0d9b8dd # v1.21.0
        with:
          name: "🚀${{ inputs.release-type }} - ${{ inputs.version }}"
          tag: ${{ inputs.version }}
          owner: ${{ vars.ORGANIZATION_NAME }}
          repo: ${{ inputs.project-name }}
          bodyFile: "${{ inputs.release-notes-file-path }}"
          prerelease: ${{ inputs.release-type }} == 'Preview'
          token: ${{ secrets.cicd-pat }}

      - name: Close Milestone
        uses: ./actions/close-milestone
        with:
          repo-owner: "${{ vars.ORGANIZATION_NAME }}"
          repo-name: "${{ inputs.project-name }}"
          github-token: "${{ secrets.cicd-pat }}"
          milestone-title: "${{ inputs.version }}"
