name: 🚀 Release
run-name: 🚀 ${{ inputs.release-type }} Release ${{ inputs.dry-run == true && '(Dry Run)' || '' }}


permissions:
  contents: read


defaults:
  run:
    shell: pwsh


on:
  workflow_dispatch:
    inputs:
      release-type:
        required: true
        description: The type of release to validate.  Either 'Preview' or 'Production'.
        type: choice
        options: [Production, Preview]
      dry-run:
        required: false
        description: Dry Run - Check to run the workflow without creating a release.
        default: false
        type: boolean


jobs:
  get_and_validate_version:
    name: Get And Validate Version
    runs-on: ubuntu-22.04
    outputs:
      version: ${{ steps.get-version.outputs.version }}
    steps:
      - name: Checkout Infrastructure Repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
        with:
          repository: KinsonDigital/Infrastructure
          ref: main

      - name: Get Version
        id: get-version
        uses: ./actions/get-version
        with:
          version-file-path: "${{ github.workspace }}/deno.json"
          json-prop-path: "version"

      - name: Validate Version
        id: validate-version
        uses: ./actions/validate-version
        with:
          version: "${{ steps.get-version.outputs.version }}"
          release-type: "${{ inputs.release-type }}"

  
  create_release_notes_file_path:
    name: Create Release Notes File Path
    needs: [get_and_validate_version]
    runs-on: ubuntu-22.04
    outputs:
      release-notes-file-path: ${{ steps.build-file-path.outputs.file-path }}
    steps:
      - name: Build File Path
        id: build-file-path
        env:
          RELEASE_TYPE: "${{ inputs.release-type }}"
          VERSION: "${{ needs.get_and_validate_version.outputs.version }}"
        run: |
          $releaseType = "$env:RELEASE_TYPE".ToLower();
          $version = "$env:VERSION";
          $releaseNotesFilePath = "release-notes/$releaseType-releases/Release-Notes-$version.md";

          "file-path=$releaseNotesFilePath" >> "$env:GITHUB_OUTPUT";


  run_prerelease_validation:
    name: Run Pre-Release Validation
    needs: [get_and_validate_version, create_release_notes_file_path]
    uses: ./.github/workflows/validate-release.yml
    with:
      owner-name: "${{ vars.ORGANIZATION_NAME }}"
      repo-name: "${{ vars.PROJECT_NAME }}"
      version: "${{ needs.get_and_validate_version.outputs.version }}"
      is-dotnet-project: false
      release-type: "${{ inputs.release-type }}"
      relative-release-notes-file-path: "${{ needs.create_release_notes_file_path.outputs.release-notes-file-path }}"
    secrets:
      cicd-pat: "${{ secrets.CICD_TOKEN }}"


  build:
    name: Build
    runs-on: ubuntu-22.04
    needs: [get_and_validate_version, run_prerelease_validation]
    steps:
      - name: Checkout Repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2

      - name: Set Up Deno (${{ vars.DENO_VERSION }})
        uses: denoland/setup-deno@22d081ff2d3a40755e97629de92e3bcbfa7cf2ed #v2.0.5
        with:
          deno-version: ${{ vars.DENO_VERSION }}
          cache: true

      - name: Build
        run: deno check ./**/*.ts;


  lint:
    name: Lint
    runs-on: ubuntu-22.04
    needs: [get_and_validate_version, run_prerelease_validation]
    steps:
      - name: Checkout Repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2

      - name: Set Up Deno (${{ vars.DENO_VERSION }})
        uses: denoland/setup-deno@22d081ff2d3a40755e97629de92e3bcbfa7cf2ed #v2.0.5
        with:
          deno-version: ${{ vars.DENO_VERSION }}
          cache: true

      - name: Lint
        run: deno lint ./**/*.ts;


  perform_release:
    name: Perform ${{ inputs.release-type }} Release
    runs-on: ubuntu-22.04
    needs: [get_and_validate_version, create_release_notes_file_path, run_prerelease_validation, build, lint]
    permissions:
      contents: write
    steps:
      - name: Checkout Repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
        with:
          token: ${{ secrets.CICD_TOKEN }}

      - name: Set Up Deno (${{ vars.DENO_VERSION }})
        uses: denoland/setup-deno@22d081ff2d3a40755e97629de92e3bcbfa7cf2ed #v2.0.5
        with:
          deno-version: ${{ vars.DENO_VERSION }}
          cache: true

      - name: Lowercase Release Type
        id: release-type
        run: |
          $releaseType = "${{ inputs.release-type }}".ToLower();
          "release-type=$releaseType" >> "$env:GITHUB_OUTPUT";

      - name: Create GitHub Release ${{ inputs.dry-run == true && '(Dry Run)' || '' }}
        if: inputs.dry-run == false
        uses: ncipollo/release-action@339a81892b84b4eeb0f6e744e4574d79d0d9b8dd # v1.21.0
        env:
          OWNER_NAME: "${{ vars.ORGANIZATION_NAME }}"
          REPO_NAME: "${{ vars.PROJECT_NAME }}"
        with:
          name: "🚀${{ inputs.release-type }} - ${{ needs.get_and_validate_version.outputs.version }}"
          tag: ${{ needs.get_and_validate_version.outputs.version }}
          owner: ${{ env.OWNER_NAME }}
          repo: ${{ env.REPO_NAME }}
          bodyFile: "${{ github.workspace }}/release-notes/${{ steps.release-type.outputs.release-type }}-releases/Release-Notes-${{ needs.get_and_validate_version.outputs.version }}.md"
          prerelease: ${{ inputs.release-type == 'Preview' }}


  process_milestone:
    name: Process Milestone
    needs: [get_and_validate_version, run_prerelease_validation, build, lint, perform_release]
    uses: ./.github/workflows/process-milestone.yml
    with:
      owner-name: "${{ vars.ORGANIZATION_NAME }}"
      repo-name: "${{ vars.PROJECT_NAME }}"
      version: "${{ needs.get_and_validate_version.outputs.version }}"
    secrets:
      cicd-pat: "${{ secrets.CICD_TOKEN }}"
