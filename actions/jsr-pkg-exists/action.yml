name: "JSR Package Exists"
description: "Checks if a JSR package exists."
inputs:
  scope:
    description: "The scope of the JSR package."
    required: true
  pkg-name:
    description: "The name of the JSR package to check."
    required: true
  version:
    description: "The version of the JSR package to check."
    required: true
  fail-if-exists:
    description: "Fail if the JSR package exists."
    required: false
    default: "true"
  cache-enabled:
    description: "Whether to enable caching of the Deno installation."
    required: false
    default: "true"
runs:
  using: "composite"
  steps:
    - name: Setup Deno (v2.7.14)
      uses: denoland/setup-deno@22d081ff2d3a40755e97629de92e3bcbfa7cf2ed #v2.0.5
      with:
        deno-version: v2.7.14
        cache: ${{ inputs.cache-enabled == 'true' }}

    - name: Run Script
      id: run-script
      shell: pwsh
      env:
        SCOPE: "${{ inputs.scope }}"
        PKG_NAME: "${{ inputs.pkg-name }}"
        VERSION: "${{ inputs.version }}"
        FAIL_IF_EXISTS: "${{ inputs.fail-if-exists }}"
      run: |
        $scriptFilePath = "$env:GITHUB_ACTION_PATH/jsr-pkg-exists.ts";

        deno run -ERWN $scriptFilePath;
outputs:
  package-exists:
    description: "Whether the JSR package exists."
    value: ${{ steps.run-script.outputs.package-exists }}
