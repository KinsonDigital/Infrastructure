name: "Release Notes Exist"
description: "Checks if a release notes file exists."
inputs:
  relative-release-notes-file-path:
    description: "The relative file path to the release notes file."
    required: true
  fail-if-does-not-exist:
    description: "Fail if the release notes do not exist."
    required: false
    default: "true"
  cache-enabled:
    description: "Whether to enable caching of the Deno installation."
    required: false
    default: "true"
runs:
  using: "composite"
  steps:
    - name: Setup Deno (v2.9.x)
      uses: denoland/setup-deno@22d081ff2d3a40755e97629de92e3bcbfa7cf2ed #v2.0.5
      with:
        deno-version: v2.9.x
        cache: ${{ inputs.cache-enabled == 'true' }}

    - name: Run Script
      id: run-script
      shell: pwsh
      env:
        RELATIVE_RELEASE_NOTES_FILE_PATH: "${{ inputs.relative-release-notes-file-path }}"
        FAIL_IF_DOES_NOT_EXIST: "${{ inputs.fail-if-does-not-exist }}"
      run: |
        $scriptFilePath = "$env:GITHUB_ACTION_PATH/release-notes-exist.ts";

        deno run -ERWN $scriptFilePath;
outputs:
  release-notes-exist:
    description: "Whether the release notes exist."
    value: ${{ steps.run-script.outputs.release-notes-exist }}
