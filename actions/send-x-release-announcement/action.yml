name: "Send X Release Announcement"
description: "Sends a release announcement to X"
inputs:
  repo-owner:
    description: "The owner of the repository."
    required: true
  project-name:
    description: "The name of the project."
    required: false
  version:
    description: "The version of the release."
    required: true
  website-url:
    description: "The URL of a website to include in the post."
    required: false
  github-token:
    description: "The GitHub token used to authenticate API requests."
    required: true
  post-template-repo-name:
    description: |
      The name of the repository containing the release X post template.
      This input requires the use of the 'post-template-branch-name' and 'post-template-repo-relative-file-path' inputs.
      Using the 'local-post-template-file-path' input takes precedence over this input.
    required: false
  post-template-branch-name:
    description: |
      The branch name of the repository containing the release X post template.
      This input requires the use of the 'post-template-repo-name' and 'post-template-repo-relative-file-path' inputs.
      Using the 'local-post-template-file-path' input takes precedence over this input.
    required: false
  post-template-repo-relative-file-path:
    description: |
      The relative file path to the release X post template within the repository set by
      the 'post-template-repo-name' and 'post-template-branch-name' inputs. This input
      requires the use of the 'post-template-repo-name' and 'post-template-branch-name' inputs.
      Using the 'local-post-template-file-path' input takes precedence over this input.
    required: false
  local-post-template-file-path:
    description: |
      The file path to the release X post template within the checked-out repository, relative to the GitHub Actions workspace.
      The caller must check out the repository (for example, using 'actions/checkout') before using this input.
      This input takes precedence over the 'post-template-repo-name', 'post-template-branch-name', and 'post-template-repo-relative-file-path' inputs.
    required: false
  discord-invite-code:
    description: "The Discord invite code to include in the post."
    required: false
  access-token-key:
    description: "The access token key."
    required: true
  access-token-secret:
    description: "The access token secret."
    required: true
  consumer-api-key:
    description: "The consumer API key."
    required: true
  consumer-api-secret:
    description: "The consumer API secret."
    required: true
  cache-enabled:
    description: "Whether to enable caching of the Deno installation."
    required: false
    default: "true"
runs:
  using: "composite"
  steps:
    - name: Setup Deno (v2.7.14)
      uses: denoland/setup-deno@22d081ff2d3a40755e97629de92e3bcbfa7cf2ed #v2.0.5
      with:
        deno-version: v2.7.14
        cache: ${{ inputs.cache-enabled == 'true' }}

    - name: Run Script
      shell: pwsh
      env:
        GITHUB_TOKEN: "${{ inputs.github-token }}"
        DENO_AUTH_TOKENS: "${{ inputs.github-token }}@raw.githubusercontent.com"
        OWNER_NAME: "${{ inputs.repo-owner }}"
        PROJECT_NAME: "${{ inputs.project-name }}"
        VERSION: "${{ inputs.version }}"
        WEBSITE_URL: "${{ inputs.website-url }}"
        POST_TEMPLATE_REPO_NAME: "${{ inputs.post-template-repo-name }}"
        POST_TEMPLATE_BRANCH_NAME: "${{ inputs.post-template-branch-name }}"
        POST_TEMPLATE_REPO_RELATIVE_FILE_PATH: "${{ inputs.post-template-repo-relative-file-path }}"
        LOCAL_POST_TEMPLATE_FILE_PATH: "${{ inputs.local-post-template-file-path }}"
        DISCORD_INVITE_CODE: "${{ inputs.discord-invite-code }}"
        ACCESS_TOKEN_KEY: "${{ inputs.access-token-key }}"
        ACCESS_TOKEN_SECRET: "${{ inputs.access-token-secret }}"
        CONSUMER_API_KEY: "${{ inputs.consumer-api-key }}"
        CONSUMER_API_SECRET: "${{ inputs.consumer-api-secret }}"
      run: |
        $scriptFilePath = "$env:GITHUB_ACTION_PATH/send-x-release-announcement.ts";

        deno run -ERN $scriptFilePath;
